<script>
  /* Apply saved (or system) theme before render to avoid a flash of the wrong theme. */
  (function () {
    try {
      var t = localStorage.getItem("wd:theme");
      if (t !== "dark" && t !== "light") {
        t = window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light";
      }
      document.documentElement.setAttribute("data-theme", t);
    } catch (e) {}
  })();
</script>

@import url('https://fonts.googleapis.com/css2?family=Schibsted+Grotesk:wght@500;700;800&family=Instrument+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500;600&display=swap');
:root{

  --line:#E2E8F0; --navy:#11355A; --accent:#2E6DA6; --accent-ink:#1C4E7E;
  --tint:#E7F0F8;
  color-scheme:light;
}
html[data-theme="dark"]{
  --bg:#0B1220; --surface:#111C2E; --ink:#E7EEF6; --ink-soft:#93A3B8;
  --line:#24344A; --navy:#0A1E36; --accent:#538DB9; --accent-ink:#7FB6DD;
  --tint:#152B44;
  color-scheme:dark;
}
html[data-theme="dark"] .card{box-shadow:none}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
.wd{font-family:'Instrument Sans',system-ui,sans-serif;color:var(--ink);background:var(--bg);min-height:100vh}
.wd-h{font-family:'Schibsted Grotesk',system-ui,sans-serif}
.mono{font-family:'IBM Plex Mono',ui-monospace,Menlo,monospace}
.flex{display:flex}.items-center{align-items:center}.justify-between{justify-content:space-between}.grid{display:grid}.grid-cols-3{grid-template-columns:repeat(3,minmax(0,1fr))}
button{font-family:inherit;cursor:pointer;border:none;background:none}
input,textarea{font-family:inherit}
.tag{display:inline-flex;align-items:center;gap:6px;border-radius:5px;line-height:1;position:relative}
.tag-hole{display:block;width:7px;height:7px;border-radius:50%;background:#fff;border:1px solid rgba(0,0,0,.14);flex:none}

.card{background:var(--surface);border:1px solid var(--line);border-radius:16px}
.press{transition:transform .08s ease}
.press:active{transform:scale(.985)}
input:focus-visible,textarea:focus-visible,button:focus-visible{outline:2px solid var(--accent);outline-offset:2px}
@keyframes slideUp{from{transform:translateY(8px);opacity:0}to{transform:translateY(0);opacity:1}}
.view{animation:slideUp .18s ease}
@media (prefers-reduced-motion:reduce){.view{animation:none}.press{transition:none}}

  body{background:#fff}

  .print-area,.print-area *{visibility:visible}
  .print-area{position:absolute;left:0;top:0;width:100%;padding:0}
  .no-print{display:none!important}
}
