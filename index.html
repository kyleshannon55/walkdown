const uid = () => Date.now().toString(36) + Math.random().toString(36).slice(2, 7);

const store = {
  async get(k){ try { const v = localStorage.getItem(k); return v == null ? null : v; } catch { return null; } },
  async set(k,v){ try { localStorage.setItem(k, v); return true; } catch { return false; } },
  async del(k){ try { localStorage.removeItem(k); } catch {} },
};

const photoDB = {
  _p: null,
  open() {
    if (this._p) return this._p;
    this._p = new Promise((res, rej) => {
      try {
        if (typeof indexedDB === "undefined") return rej(new Error("no-idb"));
        const req = indexedDB.open("walkdown_photos", 1);
        req.onupgradeneeded = () => req.result.createObjectStore("p");
        req.onsuccess = () => res(req.result);
        req.onerror = () => rej(req.error);
      } catch (e) { rej(e); }
    });
    return this._p;
  },
  async get(id) {
    try {
      const db = await this.open();
      return await new Promise((res, rej) => {
        const r = db.transaction("p").objectStore("p").get(id);
        r.onsuccess = () => res(r.result == null ? null : r.result);
        r.onerror = () => rej(r.error);
      });
    } catch { return null; }
  },
  async set(id, val) {
    try {
      const db = await this.open();
      return await new Promise((res, rej) => {
        const t = db.transaction("p", "readwrite");
        t.objectStore("p").put(val, id);
        t.oncomplete = () => res(true);
        t.onerror = () => rej(t.error);
        t.onabort = () => rej(t.error);
      });
    } catch { return false; }
  },
  async del(id) {
    try {
      const db = await this.open();
      await new Promise((res) => {
        const t = db.transaction("p", "readwrite");
        t.objectStore("p").delete(id);
        t.oncomplete = () => res();
        t.onerror = () => res();
      });
    } catch {}
  },
};

function downscale(file, maxDim = 1000, quality = 0.55) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => {
      const img = new Image();
      img.onload = () => {
        const scale = Math.min(1, maxDim / Math.max(img.width, img.height));
        const w = Math.round(img.width * scale), h = Math.round(img.height * scale);
        const c = document.createElement("canvas");
        c.width = w; c.height = h;
        c.getContext("2d").drawImage(img, 0, 0, w, h);
        resolve(c.toDataURL("image/jpeg", quality));
      };
      img.onerror = reject;
      img.src = reader.result;
    };
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}
function getCoords() {
  return new Promise((resolve) => {
    if (!navigator.geolocation) return resolve(null);
    navigator.geolocation.getCurrentPosition(
      p => resolve({ lat: +p.coords.latitude.toFixed(4), lng: +p.coords.longitude.toFixed(4) }),
      () => resolve(null), { timeout: 4000, maximumAge: 60000 }
    );
  });
}
function dataUrlToBytes(dataUrl) {
  const b64 = dataUrl.split(",")[1] || "";
  const bin = atob(b64);
  const bytes = new Uint8Array(bin.length);
  for (let i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);
  return bytes;
}
function imgSize(dataUrl) {
  return new Promise((res) => {
    const im = new Image();
    im.onload = () => res({ w: im.naturalWidth || 240, h: im.naturalHeight || 240 });
    im.onerror = () => res({ w: 240, h: 240 });
    im.src = dataUrl;
  });
}
async function getPhotoData(id) {
  let d = await photoDB.get(id);
  if (d == null) { try { d = localStorage.getItem("photo:" + id); } catch {} }
  return d;
}
function sanitizeName(s) {
  return (String(s || "audit").replace(/[^a-z0-9\- ]/gi, "").trim().replace(/\s+/g, "-").slice(0, 60)) || "audit";
}
async function saveBlob(blob, name, type) {
  try {
    const file = (typeof File !== "undefined") ? new File([blob], name, { type }) : null;
    if (file && navigator.canShare && navigator.canShare({ files: [file] })) {
      try { await navigator.share({ files: [file], title: name }); return; }
      catch (e) { if (e && e.name === "AbortError") return; }
    }
  } catch {}
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url; a.download = name;
  document.body.appendChild(a); a.click();
  setTimeout(() => { try { document.body.removeChild(a); } catch {} URL.revokeObjectURL(url); }, 1500);
}
function preview(it) {
  const bits = [];
  if (it.note) bits.push(it.note);
  else if (it.evidence) bits.push("Ev: " + it.evidence);
  if (it.photos.length) bits.push(it.photos.length + " photo" + (it.photos.length > 1 ? "s" : ""));
  if (isFinding(it)) bits.push(it.closure === "closed" ? "Closed" : "Open");
  return bits.length ? bits.join(" · ") : "Add evidence or notes";
}

    <div className="flex" style={{ gap: 6 }}>
      {STATUS_ORDER.map(code => {
        const st = STATUS[code], active = status === code;
        return (
          <button key={code} onClick={() => onSet(code)} aria-label={st.word} className="press mono"
            style={{ flex: 1, minHeight: 40, borderRadius: 9, fontSize: 13, fontWeight: 600, letterSpacing: .4,
              border: active ? "none" : "1.5px solid var(--line)",
              background: active ? st.color : "var(--surface)",
              color: active ? "#fff" : "var(--ink-soft)" }}>
            {st.code}
          </button>
        );
      })}
    </div>
  );
}

/* ============================== app ============================== */
function App() {
  const [view, setView] = useState("home");
  const [audits, setAudits] = useState([]);
  const [curAudit, setCurAudit] = useState(null);
  const [curSection, setCurSection] = useState(null);
  const [curItem, setCurItem] = useState(null);
  const [photoCache, setPhotoCache] = useState({});
  const [loading, setLoading] = useState(true);
  const [warn, setWarn] = useState(null);
  const camRef = useRef(null);
  const libRef = useRef(null);

  useEffect(() => { (async () => {
    if (hasStore) { const raw = await store.get("audits:v1"); if (raw) { try { setAudits(JSON.parse(raw)); } catch {} } }
    setLoading(false);
  })(); }, []);

  useEffect(() => {
    if (view !== "item" && view !== "report") return;
    const a = audits.find(x => x.id === curAudit); if (!a) return;
    const ids = [];
    itemsFlat(a).forEach(it => it.photos.forEach(p => { if (!(p.id in photoCache)) ids.push(p.id); }));
    if (!ids.length) return;
    let cancelled = false;
    (async () => {
      const up = {};
      for (const id of ids) {
        let d = await photoDB.get(id);
        if (d == null) { try { d = localStorage.getItem("photo:" + id); } catch {} }
        if (d) up[id] = d;
      }
      if (!cancelled && Object.keys(up).length) setPhotoCache(c => ({ ...c, ...up }));
    })();
    return () => { cancelled = true; };
  }, [view, curAudit, audits]); // eslint-disable-line

  const commit = (updater) => setAudits(prev => {
    const next = typeof updater === "function" ? updater(prev) : updater;
    if (hasStore) store.set("audits:v1", JSON.stringify(next));
    return next;
  });
  const mutateAudit = (aId, fn) => commit(prev => prev.map(a => a.id !== aId ? a : fn(a)));
  const mutateItem = (aId, sId, iId, fn) => commit(prev => prev.map(a =>
    a.id !== aId ? a : { ...a, sections: a.sections.map(s =>
      s.id !== sId ? s : { ...s, items: s.items.map(it => it.id !== iId ? it : fn(it)) }) }));

  const audit = audits.find(a => a.id === curAudit) || null;
  const section = audit ? audit.sections.find(s => s.id === curSection) : null;
  const item = section ? section.items.find(i => i.id === curItem) : null;

  const openDetail = (aId, sId, iId) => { setCurAudit(aId); setCurSection(sId); setCurItem(iId); setView("item"); };

  function setStatus(aId, sId, iId, code) {
    if (code === "NC") {
      mutateItem(aId, sId, iId, it => ({ ...it, status: "NC", severity: it.severity || "major" }));
      openDetail(aId, sId, iId);
    } else if (code === "OFI") {
      mutateItem(aId, sId, iId, it => ({ ...it, status: "OFI" }));
      openDetail(aId, sId, iId);
    } else {
      mutateItem(aId, sId, iId, it => ({ ...it, status: code }));
    }
  }
  function setStatusHere(code) {
    if (code === "NC") mutateItem(audit.id, section.id, item.id, it => ({ ...it, status: "NC", severity: it.severity || "major" }));
    else mutateItem(audit.id, section.id, item.id, it => ({ ...it, status: code }));
  }
  async function addPhoto(file) {
    if (!file) return;
    let data;
    try { data = await downscale(file); }
    catch { setWarn("Couldn’t read that image. Try another."); return; }
    const id = uid();
    const aId = audit.id, sId = section.id, iId = item.id;
    setPhotoCache(c => ({ ...c, [id]: data }));
    mutateItem(aId, sId, iId, it => ({ ...it, photos: [...it.photos, { id, ts: Date.now(), coords: null }] }));
    let ok = await photoDB.set(id, data);
    if (!ok) { try { localStorage.setItem("photo:" + id, data); ok = true; } catch {} }
    if (!ok) setWarn("Photo kept for this session but couldn’t be saved on this device.");
    getCoords().then(coords => {
      if (coords) mutateItem(aId, sId, iId, it => ({ ...it, photos: it.photos.map(p => p.id === id ? { ...p, coords } : p) }));
    });
  }
  function removePhoto(pid) {
    photoDB.del(pid);
    try { localStorage.removeItem("photo:" + pid); } catch {}
    mutateItem(audit.id, section.id, item.id, it => ({ ...it, photos: it.photos.filter(p => p.id !== pid) }));
    setPhotoCache(c => { const n = { ...c }; delete n[pid]; return n; });
  }
  function deleteAudit(id) {
    if (!window.confirm("Delete this audit and its findings? This can’t be undone.")) return;
    commit(prev => prev.filter(a => a.id !== id));
    setView("home"); setCurAudit(null);
  }

  if (loading) return <div className="wd"><div style={{ padding: 24, color: "var(--ink-soft)" }}>Loading…</div></div>;

  return (
    <div className="wd">
      <style>{CSS}</style>
      <input ref={camRef} type="file" accept="image/*" capture="environment" style={{ display: "none" }}
        onChange={e => { addPhoto(e.target.files?.[0]); e.target.value = ""; }} />
      <input ref={libRef} type="file" accept="image/*" style={{ display: "none" }}
        onChange={e => { addPhoto(e.target.files?.[0]); e.target.value = ""; }} />

      {warn && (
        <div className="no-print" onClick={() => setWarn(null)}
          style={{ position: "fixed", bottom: 16, left: 12, right: 12, zIndex: 50, background: "var(--navy)", color: "#fff",
            padding: "12px 14px", borderRadius: 12, fontSize: 13, boxShadow: "0 6px 20px rgba(0,0,0,.25)" }}>
          {warn} <span style={{ opacity: .7, marginLeft: 8 }}>Tap to dismiss</span>
        </div>
      )}

      {view === "home" && <Home audits={audits} onNew={() => setView("new")}
        onOpen={a => { setCurAudit(a.id); setView("audit"); }}
        onReset={() => { if (window.confirm("Clear all audits stored on this device?")) commit([]); }} />}

      {view === "new" && <NewAudit onBack={() => setView("home")}
        recent={[...new Set(audits.map(a => a.facility))].slice(0, 6)}
        onStart={(f, loc, key, auditor, date) => { const a = buildAudit(f, loc, key, auditor, date); commit(prev => [a, ...prev]); setCurAudit(a.id); setView("audit"); }} />}

      {view === "audit" && audit && <AuditView audit={audit}
        onBack={() => setView("home")}
        onSection={s => { setCurSection(s.id); setView("section"); }}
        onProfile={() => setView("profile")}
        onSops={() => setView("sops")}
        onReport={() => setView("report")}
        onDelete={() => deleteAudit(audit.id)} />}

      {view === "profile" && audit && <ProfileView audit={audit} onBack={() => setView("audit")}
        set={(k, v) => mutateAudit(audit.id, a => ({ ...a, profile: { ...a.profile, [k]: v } }))} />}

      {view === "sops" && audit && <SopsView audit={audit} onBack={() => setView("audit")}
        add={entry => mutateAudit(audit.id, a => ({ ...a, sops: [...a.sops, entry] }))}
        update={(id, patch) => mutateAudit(audit.id, a => ({ ...a, sops: a.sops.map(s => s.id === id ? { ...s, ...patch } : s) }))}
        remove={id => mutateAudit(audit.id, a => ({ ...a, sops: a.sops.filter(s => s.id !== id) }))} />}

      {view === "section" && audit && section && <SectionView audit={audit} section={section}
        onBack={() => setView("audit")}
        setStatus={(iId, code) => setStatus(audit.id, section.id, iId, code)}
        onDetail={iId => openDetail(audit.id, section.id, iId)} />}

      {view === "item" && audit && section && item && <ItemDetail item={item} photoCache={photoCache}
        onBack={() => setView("section")}
        setStatus={setStatusHere}
        setSeverity={sev => mutateItem(audit.id, section.id, item.id, it => ({ ...it, severity: sev }))}
        setNote={n => mutateItem(audit.id, section.id, item.id, it => ({ ...it, note: n }))}
        setEvidence={v => mutateItem(audit.id, section.id, item.id, it => ({ ...it, evidence: v }))}
        setClosure={st => mutateItem(audit.id, section.id, item.id, it => ({ ...it, closure: st, closedDate: st === "closed" ? new Date().toISOString().slice(0, 10) : "" }))}
        setClosureNote={n => mutateItem(audit.id, section.id, item.id, it => ({ ...it, closureNote: n }))}
        onCamera={() => camRef.current?.click()} onLibrary={() => libRef.current?.click()}
        onRemovePhoto={removePhoto} />}

      {view === "report" && audit && <ReportView audit={audit} photoCache={photoCache} onBack={() => setView("audit")} />}
    </div>
  );
}

/* ============================== Home ============================== */
function Home({ audits, onNew, onOpen, onReset }) {
  const open = audits.filter(a => assessedCount(a) < itemsFlat(a).length).length;
  const done = audits.length - open;
  return (
    <div className="view">
      <div style={{ background: "var(--navy)", color: "#fff", padding: "20px 18px 22px", paddingTop: "calc(20px + env(safe-area-inset-top, 0px))" }}>
        <div className="flex items-center justify-between">
          <div className="flex items-center" style={{ gap: 9 }}>
            <span className="tag tag-lg" style={{ background: "var(--accent)", padding: "6px 6px 6px 8px" }}>
              <span className="tag-hole" /><ClipboardList size={15} color="#fff" />
            </span>
            <div className="wd-h" style={{ fontSize: 22, fontWeight: 700, letterSpacing: -.3 }}>Walkdown</div>
          </div>
          {audits.length > 0 && (
            <button onClick={onReset} className="press" style={{ color: "rgba(255,255,255,.55)", fontSize: 12 }}>Reset</button>
          )}
        </div>
        <div style={{ fontSize: 13, color: "rgba(255,255,255,.7)", marginTop: 6 }}>
          Facility audit companion{audits.length > 0 ? ` · ${open} open · ${done} complete` : ""}
        </div>
      </div>

      <div style={{ padding: 16, paddingBottom: 96 }}>
        {audits.length === 0 ? (
          <div className="card" style={{ padding: 22, textAlign: "center", marginTop: 8 }}>
            <div className="wd-h" style={{ fontSize: 16, fontWeight: 600 }}>No audits yet</div>
            <div style={{ fontSize: 13, color: "var(--ink-soft)", marginTop: 6, lineHeight: 1.5 }}>
              Start one to begin walking a facility. Work the checklist, flag findings with photos, then export a report.
            </div>
          </div>
        ) : audits.map(a => {
          const total = itemsFlat(a).length, asd = assessedCount(a);
          const fs = findingsList(a);
          const crit = ncList(a).filter(f => f.severity === "critical").length;
          const isDone = asd === total;
          return (
            <button key={a.id} onClick={() => onOpen(a)} className="card press"
              style={{ display: "block", width: "100%", textAlign: "left", padding: 16, marginBottom: 12 }}>
              <div className="flex items-center justify-between" style={{ gap: 8 }}>
                <div className="wd-h" style={{ fontSize: 16, fontWeight: 600 }}>{a.facility}</div>
                <span className="mono" style={{ fontSize: 11, padding: "3px 8px", borderRadius: 6,
                  background: isDone ? "#E7F4EC" : "#EAF6F6", color: isDone ? "#1E7C44" : "var(--accent-ink)", fontWeight: 600 }}>
                  {isDone ? "COMPLETE" : "OPEN"}
                </span>
              </div>
              <div style={{ fontSize: 12, color: "var(--ink-soft)", marginTop: 3 }}>{a.typeLabel} · {fmtDate(a.date)}</div>
              <div className="flex items-center" style={{ gap: 8, margin: "12px 0 8px", flexWrap: "wrap" }}>
                {fs.length === 0
                  ? <span style={{ fontSize: 12, color: "var(--ink-soft)" }}>No findings</span>
                  : <>
                      <span style={{ fontSize: 12, color: "var(--ink)", fontWeight: 600 }}>{fs.length} finding{fs.length > 1 ? "s" : ""}</span>
                      {crit > 0 && <SeverityTag sev="critical" count={crit} />}
                    </>}
              </div>
              <div className="flex items-center" style={{ gap: 10 }}>
                <div style={{ flex: 1 }}><Bar value={total ? asd / total : 0} /></div>
                <span className="mono" style={{ fontSize: 12, color: "var(--ink-soft)" }}>{asd}/{total}</span>
              </div>
            </button>
          );
        })}
      </div>

      <div className="no-print" style={{ position: "fixed", bottom: 0, left: 0, right: 0, padding: 16,
        background: "linear-gradient(to top, var(--bg) 70%, transparent)" }}>
        <button onClick={onNew} className="press wd-h"
          style={{ width: "100%", background: "var(--navy)", color: "#fff", padding: "15px", borderRadius: 14,
            fontWeight: 600, fontSize: 16, display: "flex", alignItems: "center", justifyContent: "center", gap: 8 }}>
          <Plus size={20} /> Start new audit
        </button>
      </div>
    </div>
  );
}

/* ============================== SOPs examined ============================== */
function SopsView({ audit, onBack, add, update, remove }) {
  const [num, setNum] = useState(""); const [title, setTitle] = useState("");
  const [rev, setRev] = useState(""); const [note, setNote] = useState(""); const [flag, setFlag] = useState(false);
  const [editingId, setEditingId] = useState(null);
  const formRef = useRef(null);

  const reset = () => { setNum(""); setTitle(""); setRev(""); setNote(""); setFlag(false); setEditingId(null); };
  const submit = () => {
    if (!num.trim()) return;
    const data = { number: num.trim(), title: title.trim(), rev: rev.trim(), note: note.trim(), flag };
    if (editingId) update(editingId, data); else add({ id: uid(), ...data });
    reset();
  };
  const startEdit = (s) => {
    setEditingId(s.id); setNum(s.number); setTitle(s.title || ""); setRev(s.rev || ""); setNote(s.note || ""); setFlag(!!s.flag);
    if (formRef.current) formRef.current.scrollIntoView({ behavior: "smooth", block: "start" });
  };

  return (
    <div className="view">
      <TopBar title="Documents examined" subtitle={`${audit.facility} · ${audit.sops.length} SOP${audit.sops.length === 1 ? "" : "s"}`} onBack={onBack} />
      <div style={{ padding: 16, paddingBottom: 40 }}>
        <div ref={formRef} className="card" style={{ padding: 14, marginBottom: 16, borderColor: editingId ? "var(--accent)" : "var(--line)", borderWidth: editingId ? 2 : 1 }}>
          <div className="flex items-center justify-between" style={{ marginBottom: 12 }}>
            <div className="wd-h" style={{ fontSize: 13, fontWeight: 600 }}>{editingId ? "Edit SOP" : "Add SOP examined"}</div>
            {editingId && <button onClick={reset} className="press" style={{ fontSize: 12, color: "var(--ink-soft)" }}>Cancel</button>}
          </div>
          <div className="flex" style={{ gap: 10 }}>
            <div style={{ flex: 2 }}><TextRow label="SOP NUMBER" value={num} onChange={setNum} placeholder="SOP03-035" /></div>
            <div style={{ flex: 1 }}><TextRow label="REV" value={rev} onChange={setRev} placeholder="A" /></div>
          </div>
          <TextRow label="TITLE" value={title} onChange={setTitle} placeholder="Title (optional)" />
          <TextRow label="NOTE" value={note} onChange={setNote} placeholder="Observation (optional)" />
          <button onClick={() => setFlag(!flag)} className="press"
            style={{ display: "flex", alignItems: "center", gap: 8, fontSize: 13, color: "var(--ink-soft)", marginBottom: 14 }}>
            <span style={{ width: 20, height: 20, borderRadius: 5, border: "1.5px solid " + (flag ? "#C81E3A" : "var(--line)"),
              background: flag ? "#C81E3A" : "transparent", display: "flex", alignItems: "center", justifyContent: "center" }}>
              {flag && <Check size={13} color="#fff" />}
            </span>
            Flag a concern with this SOP
          </button>
          <button onClick={submit} disabled={!num.trim()} className="press wd-h"
            style={{ width: "100%", padding: 13, borderRadius: 12, fontWeight: 600, fontSize: 15,
              background: num.trim() ? "var(--accent)" : "var(--line)", color: num.trim() ? "#fff" : "var(--ink-soft)" }}>
            {editingId ? "Save changes" : "Add SOP"}
          </button>
        </div>
        {audit.sops.length === 0
          ? <div style={{ fontSize: 13, color: "var(--ink-soft)", textAlign: "center", padding: "8px 0" }}>No documents recorded yet.</div>
          : audit.sops.map(s => (
            <div key={s.id} className="card" style={{ padding: 14, marginBottom: 10, display: "flex", justifyContent: "space-between", gap: 10,
              borderColor: editingId === s.id ? "var(--accent)" : "var(--line)", borderWidth: editingId === s.id ? 2 : 1 }}>
              <button onClick={() => startEdit(s)} className="press" style={{ textAlign: "left", minWidth: 0, flex: 1, background: "none" }}>
                <div className="flex items-center" style={{ gap: 8, flexWrap: "wrap" }}>
                  <span className="mono" style={{ fontSize: 13, fontWeight: 600 }}>{s.number}</span>
                  {s.rev && <span className="mono" style={{ fontSize: 11, color: "var(--ink-soft)" }}>Rev {s.rev}</span>}
                  {s.flag && <PunchTag label="Concern" color="#C81E3A" fg="#fff" />}
                </div>
                {s.title && <div style={{ fontSize: 13, marginTop: 3 }}>{s.title}</div>}
                {s.note && <div style={{ fontSize: 12, color: "var(--ink-soft)", marginTop: 3 }}>{s.note}</div>}
              </button>
              <div className="flex items-center" style={{ gap: 2, flex: "none" }}>
                <button onClick={() => startEdit(s)} aria-label="Edit" className="press" style={{ color: "var(--ink-soft)", padding: 5 }}><Pencil size={15} /></button>
                <button onClick={() => { if (editingId === s.id) reset(); remove(s.id); }} aria-label="Remove" className="press" style={{ color: "var(--ink-soft)", padding: 5 }}><Trash2 size={16} /></button>
              </div>
            </div>
          ))}
      </div>
    </div>
  );
}

  const counts = SEV_ORDER.map(k => [k, ncs.filter(f => f.severity === k).length]).filter(([, n]) => n > 0);

    <div className="view">
      <TopBar title={audit.facility} subtitle={audit.typeLabel} onBack={onBack}

      <div style={{ padding: 16, paddingBottom: 96 }}>
        <div className="card" style={{ padding: 16, marginBottom: 14 }}>
          <div className="flex items-center justify-between" style={{ marginBottom: 10 }}>
            <span className="mono" style={{ fontSize: 11, color: "var(--ink-soft)" }}>#{audit.id.slice(-6).toUpperCase()}</span>
            <span style={{ fontSize: 12, color: "var(--ink-soft)" }}>{audit.location || "—"} · {fmtDate(audit.date)}</span>
          </div>
          <div className="flex items-center" style={{ gap: 10, marginBottom: 12 }}>

          <div className="flex items-center" style={{ gap: 8, flexWrap: "wrap" }}>

              : <>
                  {counts.map(([k, n]) => <SeverityTag key={k} sev={k} count={n} />)}

              <Building2 size={16} /><span className="wd-h" style={{ fontSize: 12, fontWeight: 600 }}>Facility</span>
            </div>
            <div style={{ fontSize: 12, color: filled ? "var(--ink)" : "var(--ink-soft)" }}>{filled ? `${filled} fields filled` : "Add details"}</div>

          <button onClick={onSops} className="card press" style={{ flex: 1, padding: 13, textAlign: "left" }}>

        {audit.sections.map(s => {

/* ============================== Report ============================== */
function ReportView({ audit, photoCache, onBack }) {
  const total = itemsFlat(audit).length, done = assessedCount(audit);
  const pending = total - done;
  const ncs = ncList(audit), ofis = ofiList(audit);
  const fs = findingsList(audit);
  const openCount = fs.filter(f => f.closure !== "closed").length;
  const closedCount = fs.filter(f => f.closure === "closed").length;
  const counts = SEV_ORDER.map(k => [k, ncs.filter(f => f.severity === k).length]).filter(([, n]) => n > 0);

  const ncSorted = audit.sections.flatMap(s => s.items.filter(i => i.status === "NC").map(i => ({ ...i, section: s.name }))).sort((a, b) => SEV_ORDER.indexOf(a.severity) - SEV_ORDER.indexOf(b.severity));
  const ofiSorted = audit.sections.flatMap(s => s.items.filter(i => i.status === "OFI").map(i => ({ ...i, section: s.name })));
  const allFindings = [...ncSorted, ...ofiSorted];

  const p = audit.profile;
  const prof = [
    ["Year opened", p.yearOpened], ["Employees", p.employees], ["Shifts", p.shifts], ["Size (sq ft)", p.size],
    ["Products / processes", p.products], ["Certifications", p.certifications], ["FDA registration", p.fdaReg],
    ["Prior audit", p.lastAudit], ["Primary contact", p.contact],
  ].filter(([, v]) => v && v.trim());

  const [busy, setBusy] = useState(false);
  const fileName = "Walkdown - " + sanitizeName(audit.facility) + " - " + audit.date;

  async function exportWord() {
    if (busy) return;
    setBusy(true);
    try {
      if (window.docx) await buildDocx();
      else exportDocHtml();
    } catch (err) {
      try { exportDocHtml(); } catch {}
    } finally { setBusy(false); }
  }

  async function buildDocx() {
    const D = window.docx;
    const { Document, Packer, Paragraph, TextRun, Table, TableRow, TableCell, WidthType, BorderStyle, ImageRun } = D;
    const gray = "586070", teal = "0A6E6E", red = "C81E3A";
    const P = (runs, opts = {}) => new Paragraph({ ...opts, children: Array.isArray(runs) ? runs : [runs] });
    const T = (text, o = {}) => new TextRun({ text, ...o });
    const k = [];

    k.push(P(T("Facility Audit Report", { bold: true, size: 36 })));
    k.push(P(T(audit.facility, { bold: true, size: 28 }), { spacing: { after: 120 } }));
    [`${audit.typeLabel} · ${audit.framework}`,
     `Location: ${audit.location || "—"}`,
     `Auditor: ${audit.auditor} · ${fmtDate(audit.date)}`,
     `Report ID: ${audit.id.slice(-6).toUpperCase()}`
    ].forEach(t => k.push(P(T(t, { size: 20, color: gray }))));

    if (prof.length || (p.notes && p.notes.trim())) {
      k.push(P(T("Facility", { bold: true, size: 26 }), { spacing: { before: 240, after: 100 } }));
      if (prof.length) {
        const nb = { style: BorderStyle.NONE, size: 0, color: "FFFFFF" };
        const bd = { top: nb, left: nb, right: nb, bottom: { style: BorderStyle.SINGLE, size: 2, color: "DCE0E6" } };
        k.push(new Table({
          width: { size: 100, type: WidthType.PERCENTAGE },
          rows: prof.map(([l, v]) => new TableRow({ children: [
            new TableCell({ width: { size: 38, type: WidthType.PERCENTAGE }, borders: bd, children: [P(T(l, { size: 20, color: gray }))] }),
            new TableCell({ width: { size: 62, type: WidthType.PERCENTAGE }, borders: bd, children: [P(T(String(v), { size: 20 }))] }),
          ] })),
        }));
      }
      if (p.notes && p.notes.trim()) k.push(P(T(p.notes, { size: 20 }), { spacing: { before: 100 } }));
    }

    k.push(P(T("Summary", { bold: true, size: 26 }), { spacing: { before: 240, after: 100 } }));
    k.push(P(T(`${done}/${total} assessed${pending ? ` · ${pending} pending` : ""}`, { size: 20 })));
    if (fs.length) {
      const parts = counts.map(([kk, n]) => `${SEV[kk].label}: ${n}`);
      if (ofis.length) parts.push(`OFI: ${ofis.length}`);
      k.push(P(T(parts.join("     "), { size: 20, bold: true })));
      k.push(P(T(`${fs.length} findings · ${openCount} open · ${closedCount} closed`, { size: 20, color: gray })));
    } else {
      k.push(P(T("No findings recorded", { size: 20 })));
    }

    if (allFindings.length) {
      k.push(P(T("Findings", { bold: true, size: 26 }), { spacing: { before: 240, after: 60 } }));
      for (const f of allFindings) {
        const label = f.status === "NC" ? SEV[f.severity].label.toUpperCase() : "OFI";
        const lc = f.status === "NC" ? SEV[f.severity].color.replace("#", "") : "3457A6";
        k.push(P([T(label, { bold: true, size: 20, color: lc }), T(`     ${f.section}`, { size: 18, color: gray })], { spacing: { before: 160 } }));
        k.push(P(T(f.requirement, { bold: true, size: 22 })));
        if (f.ref) k.push(P(T(f.ref, { size: 18, color: teal })));
        if (f.evidence) k.push(P([T("Evidence: ", { bold: true, size: 20 }), T(f.evidence, { size: 20 })]));
        if (f.note) k.push(P(T(f.note, { size: 20 })));
        for (const ph of f.photos) {
          const data = photoCache[ph.id] || await getPhotoData(ph.id);
          if (!data) continue;
          try {
            const { w, h } = await imgSize(data);
            const scale = Math.min(1, 260 / w);
            k.push(P(new ImageRun({ type: "jpg", data: dataUrlToBytes(data), transformation: { width: Math.round(w * scale), height: Math.round(h * scale) } }), { spacing: { before: 80 } }));
          } catch {}
        }
        const closed = f.closure === "closed";
        k.push(P([
          T(`Status: ${closed ? "Closed" : "Open"}${closed && f.closedDate ? ` (${fmtDate(f.closedDate)})` : ""}`, { size: 18, color: gray, bold: true }),
          ...(f.closureNote ? [T(` — ${f.closureNote}`, { size: 18, color: gray })] : []),
        ], { spacing: { before: 40 } }));
      }
    }

    k.push(P(T("Documents examined", { bold: true, size: 26 }), { spacing: { before: 240, after: 60 } }));
    if (!audit.sops.length) k.push(P(T("None recorded.", { size: 20, color: gray })));
    else audit.sops.forEach(s => {
      const runs = [T(s.number, { bold: true, size: 20 })];
      if (s.rev) runs.push(T(`   Rev ${s.rev}`, { size: 18, color: gray }));
      if (s.flag) runs.push(T("   [Concern]", { bold: true, size: 18, color: red }));
      k.push(P(runs, { spacing: { before: 80 } }));
      if (s.title) k.push(P(T(s.title, { size: 20 })));
      if (s.note) k.push(P(T(s.note, { size: 18, color: gray })));
    });

    if (pending > 0) k.push(P(T(`${pending} requirement${pending > 1 ? "s" : ""} not yet assessed.`, { italics: true, size: 18, color: gray }), { spacing: { before: 200 } }));

    const doc = new Document({ sections: [{ properties: {}, children: k }] });
    const blob = await Packer.toBlob(doc);
    await saveBlob(blob, fileName + ".docx", "application/vnd.openxmlformats-officedocument.wordprocessingml.document");
  }

  function exportDocHtml() {
    const esc = (s) => String(s == null ? "" : s).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
    let h = `<h1 style="font-family:Arial">Facility Audit Report</h1><h2 style="font-family:Arial">${esc(audit.facility)}</h2>`;
    h += `<p style="font-family:Consolas,monospace;color:#586070">${esc(audit.typeLabel)} &middot; ${esc(audit.framework)}<br>Location: ${esc(audit.location || "—")}<br>Auditor: ${esc(audit.auditor)} &middot; ${esc(fmtDate(audit.date))}<br>Report ID: ${esc(audit.id.slice(-6).toUpperCase())}</p>`;
    if (prof.length || (p.notes && p.notes.trim())) {
      h += `<h3 style="font-family:Arial">Facility</h3><table cellpadding="4" style="font-family:Arial;border-collapse:collapse">`;
      prof.forEach(([l, v]) => { h += `<tr><td style="color:#586070">${esc(l)}</td><td>${esc(v)}</td></tr>`; });
      h += `</table>`;
      if (p.notes && p.notes.trim()) h += `<p style="font-family:Arial">${esc(p.notes)}</p>`;
    }
    h += `<h3 style="font-family:Arial">Summary</h3><p style="font-family:Arial">${esc(done)}/${esc(total)} assessed${pending ? ` &middot; ${pending} pending` : ""}<br>`;
    if (fs.length) {
      const parts = counts.map(([kk, n]) => `${SEV[kk].label}: ${n}`); if (ofis.length) parts.push(`OFI: ${ofis.length}`);
      h += `<b>${esc(parts.join("   "))}</b><br>${fs.length} findings &middot; ${openCount} open &middot; ${closedCount} closed`;
    } else h += `No findings recorded`;
    h += `</p>`;
    if (allFindings.length) {
      h += `<h3 style="font-family:Arial">Findings</h3>`;
      allFindings.forEach(f => {
        const label = f.status === "NC" ? SEV[f.severity].label.toUpperCase() : "OFI";
        h += `<p style="font-family:Arial"><b>${esc(label)}</b> &middot; <span style="color:#586070">${esc(f.section)}</span><br><b>${esc(f.requirement)}</b>`;
        if (f.ref) h += `<br><span style="color:#0A6E6E">${esc(f.ref)}</span>`;
        if (f.evidence) h += `<br><b>Evidence:</b> ${esc(f.evidence)}`;
        if (f.note) h += `<br>${esc(f.note)}`;
        h += `</p>`;
        f.photos.forEach(ph => { const data = photoCache[ph.id]; if (data) h += `<p><img src="${data}" style="max-width:260px"/></p>`; });
        const closed = f.closure === "closed";
        h += `<p style="font-family:Arial;color:#586070">Status: ${closed ? "Closed" : "Open"}${closed && f.closedDate ? ` (${esc(fmtDate(f.closedDate))})` : ""}${f.closureNote ? " — " + esc(f.closureNote) : ""}</p>`;
      });
    }
    h += `<h3 style="font-family:Arial">Documents examined</h3>`;
    if (!audit.sops.length) h += `<p style="font-family:Arial;color:#586070">None recorded.</p>`;
    else audit.sops.forEach(s => { h += `<p style="font-family:Arial"><b>${esc(s.number)}</b>${s.rev ? `  Rev ${esc(s.rev)}` : ""}${s.flag ? `  <span style="color:#C81E3A"><b>[Concern]</b></span>` : ""}${s.title ? `<br>${esc(s.title)}` : ""}${s.note ? `<br><span style="color:#586070">${esc(s.note)}</span>` : ""}</p>`; });
    if (pending > 0) h += `<p style="font-family:Arial;color:#586070"><i>${pending} requirement${pending > 1 ? "s" : ""} not yet assessed.</i></p>`;
    const html = `<html xmlns:o='urn:schemas-microsoft-com:office:office' xmlns:w='urn:schemas-microsoft-com:office:word' xmlns='http://www.w3.org/TR/REC-html40'><head><meta charset='utf-8'></head><body>${h}</body></html>`;
    saveBlob(new Blob(["\ufeff" + html], { type: "application/msword" }), fileName + ".doc", "application/msword");
  }

  return (
    <div className="view">
      <TopBar title="Report" subtitle={audit.facility} onBack={onBack}
        right={<div className="flex items-center" style={{ gap: 14 }}>
          <button onClick={() => window.print()} className="press wd-h" style={{ fontSize: 13, fontWeight: 600, color: "var(--ink-soft)", padding: "6px 2px" }}>PDF</button>
          <button onClick={exportWord} disabled={busy} className="press wd-h" style={{ fontSize: 13, fontWeight: 600, color: "var(--accent-ink)", padding: "6px 2px" }}>{busy ? "…" : "Word"}</button>
        </div>} />

      <div className="print-area" style={{ padding: 16, paddingBottom: 48 }}>
        <div style={{ borderBottom: "2px solid var(--ink)", paddingBottom: 12, marginBottom: 14 }}>
          <div className="wd-h" style={{ fontSize: 20, fontWeight: 700 }}>Facility Audit Report</div>
          <div className="wd-h" style={{ fontSize: 16, fontWeight: 600, marginTop: 4 }}>{audit.facility}</div>
          <div className="mono" style={{ fontSize: 12, color: "var(--ink-soft)", marginTop: 6, lineHeight: 1.7 }}>
            {audit.typeLabel} · {audit.framework}<br />
            Location: {audit.location || "—"}<br />
            Auditor: {audit.auditor} · {fmtDate(audit.date)}<br />
            Report ID: {audit.id.slice(-6).toUpperCase()}
          </div>
        </div>

        {(prof.length > 0 || (p.notes && p.notes.trim())) && (
          <div className="card" style={{ padding: 14, marginBottom: 16 }}>
            <div className="wd-h" style={{ fontSize: 13, fontWeight: 600, marginBottom: 10 }}>Facility</div>
            {prof.map(([l, v]) => (
              <div key={l} className="flex" style={{ justifyContent: "space-between", gap: 12, padding: "3px 0", fontSize: 13 }}>
                <span style={{ color: "var(--ink-soft)" }}>{l}</span><span style={{ textAlign: "right" }}>{v}</span>
              </div>
            ))}
            {p.notes && p.notes.trim() && <div style={{ fontSize: 13, color: "var(--ink-soft)", marginTop: 8, lineHeight: 1.5 }}>{p.notes}</div>}
          </div>
        )}

        <div className="card" style={{ padding: 14, marginBottom: 16 }}>
          <div className="flex items-center justify-between" style={{ marginBottom: 10 }}>
            <span className="wd-h" style={{ fontSize: 13, fontWeight: 600 }}>Summary</span>
            <span className="mono" style={{ fontSize: 12, color: "var(--ink-soft)" }}>{done}/{total} assessed{pending ? ` · ${pending} pending` : ""}</span>
          </div>
          <div className="flex items-center" style={{ gap: 8, flexWrap: "wrap" }}>
            {fs.length === 0
              ? <span style={{ fontSize: 13, color: "#1E7C44", fontWeight: 600 }}>No findings recorded</span>
              : <>
                  {counts.map(([k, n]) => <SeverityTag key={k} sev={k} count={n} size="lg" />)}
                  {ofis.length > 0 && <OfiTag count={ofis.length} size="lg" />}
                </>}
          </div>
          {fs.length > 0 && (
            <div className="mono" style={{ fontSize: 12, color: "var(--ink-soft)", marginTop: 10 }}>
              {fs.length} finding{fs.length > 1 ? "s" : ""} · {openCount} open · {closedCount} closed
            </div>
          )}
        </div>

        {allFindings.length > 0 && (
          <>
            <div className="wd-h" style={{ fontSize: 13, fontWeight: 600, color: "var(--ink-soft)", marginBottom: 10 }}>FINDINGS</div>
            {allFindings.map(f => (
              <div key={f.id} className="card" style={{ padding: 14, marginBottom: 10 }}>
                <div className="flex items-center justify-between" style={{ gap: 8, marginBottom: 8 }}>
                  {f.status === "NC" ? <SeverityTag sev={f.severity} /> : <OfiTag />}
                  <span className="mono" style={{ fontSize: 11, color: "var(--ink-soft)" }}>{f.section}</span>
                </div>
                <div style={{ fontSize: 14, lineHeight: 1.4, fontWeight: 500 }}>{f.requirement}</div>
                {f.ref && <div className="mono" style={{ fontSize: 11, color: "var(--accent-ink)", marginTop: 4 }}>{f.ref}</div>}
                {f.evidence && <div style={{ fontSize: 13, marginTop: 8 }}><span style={{ color: "var(--ink-soft)" }}>Evidence: </span>{f.evidence}</div>}
                {f.note && <div style={{ fontSize: 13, color: "var(--ink-soft)", marginTop: 6, lineHeight: 1.5 }}>{f.note}</div>}
                {f.photos.length > 0 && (
                  <div className="grid grid-cols-3" style={{ gap: 6, marginTop: 10 }}>
                    {f.photos.map(ph => (
                      <div key={ph.id} style={{ aspectRatio: "1", borderRadius: 8, overflow: "hidden", background: "var(--line)" }}>
                        {photoCache[ph.id] && <img src={photoCache[ph.id]} alt="evidence" style={{ width: "100%", height: "100%", objectFit: "cover" }} />}
                      </div>
                    ))}
                  </div>
                )}
                <div className="flex items-center" style={{ gap: 8, marginTop: 10, flexWrap: "wrap" }}>
                  <span className="mono" style={{ fontSize: 11, padding: "3px 8px", borderRadius: 6, fontWeight: 600,
                    background: f.closure === "closed" ? "#E7F4EC" : "#FBEEF0", color: f.closure === "closed" ? "#1E7C44" : "#C81E3A" }}>
                    {f.closure === "closed" ? "CLOSED" : "OPEN"}{f.closure === "closed" && f.closedDate ? ` · ${fmtDate(f.closedDate)}` : ""}
                  </span>
                  {f.closureNote && <span style={{ fontSize: 12, color: "var(--ink-soft)" }}>{f.closureNote}</span>}
                </div>
              </div>
            ))}
          </>
        )}

        <div className="wd-h" style={{ fontSize: 13, fontWeight: 600, color: "var(--ink-soft)", margin: "4px 0 10px" }}>DOCUMENTS EXAMINED</div>
        {audit.sops.length === 0
          ? <div style={{ fontSize: 13, color: "var(--ink-soft)", marginBottom: 16 }}>None recorded.</div>
          : <div className="card" style={{ padding: 6, marginBottom: 16 }}>
              {audit.sops.map((s, i) => (
                <div key={s.id} style={{ padding: "8px 8px", borderTop: i ? "1px solid var(--line)" : "none" }}>
                  <div className="flex items-center" style={{ gap: 8, flexWrap: "wrap" }}>
                    <span className="mono" style={{ fontSize: 12, fontWeight: 600 }}>{s.number}</span>
                    {s.rev && <span className="mono" style={{ fontSize: 11, color: "var(--ink-soft)" }}>Rev {s.rev}</span>}
                    {s.flag && <PunchTag label="Concern" color="#C81E3A" fg="#fff" />}
                  </div>
                  {s.title && <div style={{ fontSize: 12, marginTop: 2 }}>{s.title}</div>}
                  {s.note && <div style={{ fontSize: 12, color: "var(--ink-soft)", marginTop: 2 }}>{s.note}</div>}
                </div>
              ))}
            </div>}

        {pending > 0 && (
          <div style={{ fontSize: 12, color: "var(--ink-soft)", marginTop: 4, fontStyle: "italic" }}>
            {pending} requirement{pending > 1 ? "s" : ""} not yet assessed.
          </div>
        )}
      </div>
    </div>
  );
}


ReactDOM.createRoot(document.getElementById("root")).render(<App />);

</script>
</body>
</html>
